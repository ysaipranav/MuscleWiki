name: MuscleWikiApp
options:
  bundleIdPrefix: com.musclewiki
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    PRODUCT_BUNDLE_IDENTIFIER: com.musclewiki.app
    DEVELOPMENT_TEAM: ""
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MuscleWikiApp:
    type: application
    platform: iOS
    sources:
      - path: MuscleWikiApp
    resources:
      - path: MuscleWikiApp/Resources/Assets.xcassets
      - path: MuscleWikiApp/Resources/workout-data.json
      - path: MuscleWikiApp/Resources/workout-attributes.json
      - path: MuscleWikiApp/Resources/PrivacyInfo.xcprivacy
    settings:
      base:
        INFOPLIST_FILE: MuscleWikiApp/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies:
      - framework: AVFoundation.framework
      - framework: WebKit.framework
      - framework: CoreSpotlight.framework
      - framework: Network.framework

  MuscleWikiAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MuscleWikiAppTests
    dependencies:
      - target: MuscleWikiApp
    settings:
      base:
        INFOPLIST_FILE: MuscleWikiAppTests/Info.plist

  MuscleWikiAppUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MuscleWikiAppUITests
    dependencies:
      - target: MuscleWikiApp
    settings:
      base:
        INFOPLIST_FILE: MuscleWikiAppUITests/Info.plist
